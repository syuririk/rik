[project]
name = "rikfeed"
version = "0.1.0"
description = "Persistence and scheduling layer consuming standardized rik data."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "syuririk" }]
dependencies = [
    "rikschema",
    "rikcore",
]

[project.optional-dependencies]
test = ["pytest>=8"]

[tool.uv.sources]
rikschema = { workspace = true }
rikcore = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rikfeed"]
