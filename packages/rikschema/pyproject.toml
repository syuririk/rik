[project]
name = "rikschema"
version = "0.1.0"
description = "Data and behavior contract for the rik ecosystem (rikcore, rikfeed)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "syuririk" }]
dependencies = [
    "pydantic>=2.6",
]

[project.optional-dependencies]
test = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rikschema"]

[tool.hatch.version]
path = "src/rikschema/version.py"
